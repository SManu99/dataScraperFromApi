<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Magazinul Meu - Licență</title>
    <!-- Adăugăm Bootstrap pentru design rapid și frumos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Un pic de CSS ca să arate pozele uniform */
        .card-img-top {
            height: 250px;
            object-fit: contain; /* Păstrează proporțiile imaginii de la FakeStore */
            padding: 20px;
        }
    </style>
</head>
<body class="bg-light">

<!-- Meniul de Sus (Navbar) -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">My eCommerce App</span>
    </div>
</nav>

<!-- Containerul principal cu produsele -->
<div class="container">
    <h2 class="mb-4">Produsele Noastre</h2>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <!-- AICI E MAGIA THYMELEAF: Repetăm acest bloc (card) pentru fiecare produs din baza de date -->
        <div class="col" th:each="produs : ${produse}">
            <div class="card h-100 shadow-sm">
                <!-- Încărcăm URL-ul imaginii din baza de date -->
                <img th:src="${produs.imageUrl}" class="card-img-top" alt="Imagine Produs">

                <div class="card-body d-flex flex-column">
                    <!-- Afișăm Numele Produsului -->
                    <h5 class="card-title text-truncate" th:text="${produs.name}" title="Vezi numele complet">Nume Produs Test</h5>

                    <!-- Afișăm Categoria -->
                    <p class="text-muted small mb-2" th:text="${produs.category}">Categorie Test</p>

                    <!-- Afișăm Prețul -->
                    <h4 class="text-primary mt-auto">
                        <span th:text="${produs.price}">99.99</span> Lei
                    </h4>
                </div>

                <div class="card-footer bg-white border-top-0 pb-3">
                    <a href="#" class="btn btn-outline-dark w-100">Adaugă în coș</a>
                </div>
            </div>
        </div>
        <!-- Sfârșit bloc magic -->
    </div>
</div>

</body>
</html>
